<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Matchmaker</title>
</head>
<body>
    <h1>Course Matchmaker</h1>
    <form id="studentForm">
        <label for="location">Location:</label>
        <input type="text" id="location" name="location" required><br><br>

        <label for="studyLevel">Level of Study:</label>
        <select id="studyLevel" name="studyLevel" required>
            <option value="undergraduate">Undergraduate</option>
            <option value="postgraduate">Postgraduate</option>
        </select><br><br>

        <label for="courseInterest">Course Interest:</label>
        <input type="text" id="courseInterest" name="courseInterest" required><br><br>

        <label for="additionalInterests">Additional Interests:</label>
        <textarea id="additionalInterests" name="additionalInterests"></textarea><br><br>

        <label for="budget">Budget (in USD):</label>
        <input type="number" id="budget" name="budget" required><br><br>

        <button type="submit">Find Courses</button>
    </form>

    <div id="results"></div>

    <script src="script.js"></script>
</body>
</html>
