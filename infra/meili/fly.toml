app = "mcm-meili"
primary_region = "lhr"

[build]
  image = "getmeili/meilisearch:v1.10"

[env]
  MEILI_NO_ANALYTICS = "true"
  MEILI_ENV = "production"
  MEILI_DB_PATH = "/meili_data"

[http_service]
  internal_port = 7700
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[mounts]]
  source = "meili_data"
  destination = "/meili_data"
  initial_size = "1gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
