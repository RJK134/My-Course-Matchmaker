services:
  db:
    image: postgres:16-alpine
    container_name: mcm-db
    environment:
      POSTGRES_DB: coursematchmaker
      POSTGRES_USER: mcm
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcm -d coursematchmaker"]
      interval: 3s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: mcm-meili
    environment:
      MEILI_MASTER_KEY: mcm-dev-master-key-change-me
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    volumes:
      - meilidata:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      PORT: 3002
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: coursematchmaker
      DB_USER: mcm
      DB_PASSWORD: changeme
      MEILI_HOST: http://meilisearch:7700
      MEILI_KEY: mcm-dev-master-key-change-me
      ADMIN_API_KEY: dev-admin-key
    ports:
      - "3002:3002"

  frontend:
    build: ./frontend
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8180:80"
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  meilidata:
